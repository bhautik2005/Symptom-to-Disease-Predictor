data:
  raw_path: "data/raw/Final_Augmented_dataset_Diseases_and_Symptoms.csv"
  processed_dir: "artifacts/data"
  plots_dir: "artifacts/plots"
  models_dir: "artifacts/models"
  reports_dir: "artifacts/reports"

preprocessing:
  test_size: 0.20
  random_state: 42
  symptom_threshold: 0.005 # symptoms appearing in < 0.5% records are filtered

models:
  baseline:
    random_state: 42
  rf_tuning:
    random_state: 42
    n_iter: 2
    cv: 2
    param_grid:
      n_estimators: [30, 50]
      max_depth: [10, 15, 20]
      min_samples_split: [5, 10]
      min_samples_leaf: [4, 6]
      max_features: ["sqrt", "log2"]
      class_weight: [null, "balanced"]
